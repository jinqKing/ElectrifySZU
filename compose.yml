services:
  electrifyszu:
    build:
      context: .
    image: electrifyszu:local
    container_name: electrifyszu
    restart: unless-stopped
    network_mode: host
    env_file:
      - path: ./.env
        required: false
    volumes:
      - ./data:/app/data
    command: ["python", "server.py", "--host", "127.0.0.1", "--port", "8000"]

  electrifyszu-nginx:
    image: nginx:alpine
    container_name: electrifyszu-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/nginx/electrifyszu.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - electrifyszu
