name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    env:
      DORM_API_BASE: https://example.invalid
      DORM_CLIENT: test-client
      DORM_CAMPUS_NAME: test-campus
      DORM_BUILDING_ID: test-building-id
      DORM_BUILDING_NAME: test-building
      DORM_ROOM_ID: test-room-id
      DORM_ROOM_NAME: test-room
      DORM_POLL_INTERVAL: "60"
      DORM_LOW_POWER_THRESHOLD: "10"
      SMTP_HOST: smtp.example.invalid
      SMTP_PORT: "465"
      SMTP_USER: test@example.invalid
      SMTP_PASSWORD: test-password
      SENDER_EMAIL: test@example.invalid
      SENDER_NAME: ElectrifySZU CI
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run tests
        run: uv run pytest -q
