<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ElectrifySZU 电费仪表盘</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">SZU Dorm Power Monitor</p>
          <h1 id="page-title">电费余额仪表盘</h1>
          <p class="subtitle">选择校区、宿舍楼栋并输入房间号，系统会自动完成查询并展示余额。</p>
        </div>
        <div class="hero-status" id="heroStatus">
          <span class="pulse"></span>
          <span>等待查询</span>
        </div>
      </section>

      <section class="query-panel" aria-label="查询条件">
        <form id="queryForm" class="query-form">
          <label>
            <span>校区</span>
            <select id="campusGroup">
              <option value="yuehai" selected>粤海</option>
              <option value="lihu">丽湖</option>
            </select>
            <input id="client" name="client" type="hidden" value="192.168.84.87" />
            <input id="campusName" name="campusName" type="hidden" value="粤海" />
          </label>
          <label>
            <span>宿舍楼栋</span>
            <input id="buildingSearch" list="buildingOptions" value="风槐斋" placeholder="搜索宿舍楼栋" autocomplete="off" />
            <datalist id="buildingOptions"></datalist>
            <input id="buildingId" name="buildingId" type="hidden" value="7126" />
            <input id="buildingName" name="buildingName" type="hidden" value="风槐斋" />
          </label>
          <label>
            <span>房间号</span>
            <input id="roomName" name="roomName" value="713" placeholder="例如 713" autocomplete="off" />
          </label>
          <label>
            <span>统计天数</span>
            <input id="days" name="days" type="number" min="1" max="180" value="30" />
          </label>
          <div class="actions">
            <button class="primary" type="submit">查询余额</button>
            <button class="secondary" type="button" id="demoButton">载入演示</button>
          </div>
        </form>
        <p class="message query-hint" id="message">
          连接校园网后查询真实余额，也可先载入演示数据预览效果。
        </p>
      </section>

      <section class="metrics" aria-live="polite">
        <article class="metric balance">
          <span class="metric-label">当前余额</span>
          <strong id="remaining">--</strong>
          <small>kWh</small>
        </article>
        <article class="metric">
          <span class="metric-label">日均用电</span>
          <strong id="dailyAvg">--</strong>
          <small>kWh / day</small>
        </article>
        <article class="metric">
          <span class="metric-label">预计可用</span>
          <strong id="daysLeft">--</strong>
          <small>days</small>
        </article>
        <article class="metric">
          <span class="metric-label">周期用电</span>
          <strong id="totalUsed">--</strong>
          <small>kWh</small>
        </article>
      </section>

      <section class="chart-panel" aria-label="用电趋势">
        <div class="section-head">
          <div>
            <h2>余额与用电趋势</h2>
            <p class="section-note">余额走势和每日用电量会在查询后自动更新。</p>
          </div>
          <span id="chartRange">暂无数据</span>
        </div>
        <div id="trendChart" class="trend-chart empty">暂无趋势数据</div>
      </section>

      <section class="details-grid">
        <article class="detail">
          <div class="section-head">
            <h2>预警状态</h2>
            <span class="badge" id="statusBadge">未查询</span>
          </div>
          <div class="meter" aria-hidden="true">
            <div id="meterFill"></div>
          </div>
          <dl class="facts">
            <div>
              <dt>房间</dt>
              <dd id="roomLabel">--</dd>
            </div>
            <div>
              <dt>最近记录</dt>
              <dd id="lastRecord">--</dd>
            </div>
            <div>
              <dt>统计周期</dt>
              <dd id="period">--</dd>
            </div>
            <div>
              <dt>记录数</dt>
              <dd id="records">--</dd>
            </div>
          </dl>
        </article>

        <article class="detail">
          <div class="section-head">
            <h2>最近充值</h2>
            <span id="rechargeCount">0 条</span>
          </div>
          <div id="rechargeList" class="recharge-list empty">暂无数据</div>
        </article>
      </section>

    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
