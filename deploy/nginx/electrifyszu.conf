# ── ElectrifySZU — Production Nginx config ──────────────────────────
#
# Architecture (three layers):
#   1. Nginx serves static files directly
#   2. Campus-dependent API → SSH tunnel to campus machine
#   3. Public-safe API → local Python server
#
# Tunnel setup (on public server):
#   Campus machine runs:  python server_campus.py --port 8000
#   Public server runs:   autossh -M 0 -N -R 18080:localhost:8000 user@129.204.227.179
#
# Public API server (on public server):
#   python server_public.py --port 8000
#
# ─────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=electrifyszu_general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=electrifyszu_api:10m rate=12r/m;

upstream campus_tunnel {
    server 127.0.0.1:18080;    # SSH tunnel → campus machine :8000
    keepalive 4;
}

upstream public_api {
    server 127.0.0.1:8000;     # server_public.py on the same host
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/electrifyszu.access.log;
    error_log /var/log/nginx/electrifyszu.error.log;

    client_max_body_size 256k;

    # ── Static files — Nginx serves directly ──────────────────────
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ── Campus-dependent API → SSH tunnel → Campus machine ────────
    location = /api/status {
        limit_req zone=electrifyszu_api burst=8 nodelay;
        proxy_pass http://campus_tunnel;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /api/buildings {
        limit_req zone=electrifyszu_api burst=5 nodelay;
        proxy_pass http://campus_tunnel;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ~ ^/api/(building-ranking|apartment/) {
        limit_req zone=electrifyszu_api burst=5 nodelay;
        proxy_pass http://campus_tunnel;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Public-safe API → Local Python server ─────────────────────
    location = /api/subscriptions {
        limit_req zone=electrifyszu_api burst=5 nodelay;
        proxy_pass http://public_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=electrifyszu_general burst=15 nodelay;
        proxy_pass http://public_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
